<!DOCTYPE html>
<html>
<head>
    <title>Agrifusion AI - Multi-language Support</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7f9;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 750px;
            margin: 30px auto;
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        .header {
            background: #2e7d32;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .language-bar {
            background: #e8f5e9;
            padding: 10px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .lang-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background: #c8e6c9;
        }

        .lang-btn.active {
            background: #2e7d32;
            color: white;
        }

        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 15px;
        }

        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
        }

        .user {
            background: #2e7d32;
            color: white;
            text-align: right;
        }

        .bot {
            background: #e9ecef;
            color: #333;
        }

        .input-area {
            padding: 15px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        button {
            padding: 10px 15px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .mic-btn {
            background: #ff5722;
        }

        .voice-toggle {
            background: #2196f3;
        }

        .voice-off {
            background: #9e9e9e;
        }

        .recording {
            background: #f44336;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .section {
            margin-bottom: 10px;
            padding: 8px;
            border-left: 3px solid #2e7d32;
            background: #f9f9f9;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        🌱 Agrifusion AI - Njira Zamakono za Ulimi
    </div>

    <div class="language-bar">
        <button class="lang-btn active" onclick="changeLanguage('ny', this)">🇲🇼 Chichewa</button>
        <button class="lang-btn" onclick="changeLanguage('en', this)">🇬🇧 English</button>
    </div>

    <div id="chat" class="chat-box"></div>

    <div class="input-area">
        <input id="q" placeholder="Funsani funso lanu..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">Send</button>
        <button class="mic-btn" id="micBtn" onclick="startRecording()">🎤</button>
        <button id="voiceToggle" class="voice-toggle" onclick="toggleVoice()">🔊 ON</button>
    </div>

</div>

<script>

let currentLang = 'ny';
let mediaRecorder;
let audioChunks = [];
let voiceEnabled = true;

/* =========================
   LANGUAGE SWITCH
========================= */
function changeLanguage(lang, btn) {
    currentLang = lang;

    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');

    const placeholders = {
        'ny': 'Funsani funso lanu...',
        'tum': 'Fumbani fundo yinu...',
        'en': 'Ask your question...'
    };

    document.getElementById('q').placeholder = placeholders[lang];
}

/* =========================
   CHAT UI SAFE
========================= */
function addMessage(text, isUser) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `message ${isUser ? 'user' : 'bot'}`;
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

/* =========================
   FORMAT RESPONSE
========================= */
function formatResponse(data) {
    return `
        <div class="section"><strong>🌾 Indigenous:</strong><br>${data.indigenous_insight || ''}</div>
        <div class="section"><strong>📊 Scientific:</strong><br>${data.scientific_insight || ''}</div>
        <div class="section"><strong>💡 Recommendation:</strong><br>${data.recommendation || ''}</div>
        <div class="section"><strong>⚠️ Risk:</strong><br>${data.risk || ''}</div>
    `;
}

/* =========================
   VOICE TOGGLE
========================= */
function toggleVoice() {
    voiceEnabled = !voiceEnabled;

    const btn = document.getElementById('voiceToggle');

    if (voiceEnabled) {
        btn.textContent = "🔊 ON";
        btn.classList.remove("voice-off");
    } else {
        btn.textContent = "🔇 OFF";
        btn.classList.add("voice-off");
        window.speechSynthesis.cancel();
    }
}

/* =========================
   TEXT TO SPEECH (FIXED)
========================= */
function speakText(text) {
    if (!voiceEnabled) return;
    if (!text) return;

    try {
        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1;

        window.speechSynthesis.speak(utterance);

    } catch (e) {
        console.log("TTS error:", e);
    }
}

/* =========================
   SEND MESSAGE (FIXED)
========================= */
async function sendMessage() {
    const input = document.getElementById('q');
    const query = input.value.trim();

    if (!query) return;

    addMessage(query, true);
    input.value = '';

    addMessage('✍️ Thinking...', false);

    let thinkingRemoved = false;

    try {
        const response = await fetch(`/ask-multilingual/?q=${encodeURIComponent(query)}&lang=${currentLang}`);
        const data = await response.json();

        const chat = document.getElementById('chat');

        if (!thinkingRemoved && chat.lastChild) {
            chat.removeChild(chat.lastChild);
            thinkingRemoved = true;
        }

        addMessage(formatResponse(data), false);

        // SAFE SPEECH FALLBACK (FIXED)
        const speechText =
            data.recommendation ||
            data.indigenous_insight ||
            data.scientific_insight ||
            "No response available";

        speakText(speechText);

    } catch (error) {
        const chat = document.getElementById('chat');

        if (chat.lastChild) {
            chat.removeChild(chat.lastChild);
        }

        addMessage('⚠️ Network error', false);
    }
}

/* =========================
   SPEECH TO TEXT (FIXED CSRF)
========================= */
async function startRecording() {
    const micBtn = document.getElementById('micBtn');

    if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        micBtn.classList.remove('recording');
        micBtn.textContent = '🎤';
        return;
    }

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

        mediaRecorder.onstop = async () => {

            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append('audio', audioBlob, 'recording.webm');

            addMessage('🎤 Transcribing...', false);

            try {
                const csrftoken = getCookie('csrftoken');

                const response = await fetch('/speech-to-text/', {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': csrftoken
                    },
                    body: formData
                });

                const data = await response.json();

                const chat = document.getElementById('chat');
                if (chat.lastChild) chat.removeChild(chat.lastChild);

                if (data.text) {
                    document.getElementById('q').value = data.text;
                    sendMessage();
                } else {
                    addMessage('⚠️ Could not understand audio', false);
                }

            } catch (error) {
                addMessage('⚠️ Speech error', false);
            }

            stream.getTracks().forEach(track => track.stop());
        };

        mediaRecorder.start();
        micBtn.classList.add('recording');
        micBtn.textContent = '⏹️';

    } catch {
        alert('Please allow microphone access');
    }
}

/* =========================
   CSRF
========================= */
function getCookie(name) {
    let cookieValue = null;

    if (document.cookie) {
        const cookies = document.cookie.split(';');

        for (let c of cookies) {
            c = c.trim();
            if (c.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(c.substring(name.length + 1));
                break;
            }
        }
    }

    return cookieValue;
}

/* =========================
   ENTER KEY
========================= */
function handleKey(event) {
    if (event.key === 'Enter') sendMessage();
}

</script>

</body>
</html>
