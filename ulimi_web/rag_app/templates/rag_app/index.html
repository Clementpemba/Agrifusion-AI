<!DOCTYPE html>
<html>
<head>
    <title>Agrifusion AI</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7f9;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 750px;
            margin: 30px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #2e7d32;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .chat-box {
            height: 500px;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.5;
        }

        .user {
            background: #2e7d32;
            color: white;
            align-self: flex-end;
        }

        .bot {
            background: #e9ecef;
            color: #333;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 14px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 14px 20px;
            cursor: pointer;
        }

        button:hover {
            background: #256428;
        }

        .typing {
            font-style: italic;
            color: gray;
            font-size: 13px;
        }

        .section {
            margin-bottom: 10px;
            padding: 10px;
            border-left: 4px solid #2e7d32;
            background: #f1f8f4;
            border-radius: 6px;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 4px;
            color: #2e7d32;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="header">🌱 Agrifusion AI</div>
    <div id="chat" class="chat-box"></div>
    <div class="input-area">
        <input id="q" placeholder="Ask a farming question..." onkeypress="handleKey(event)">
        <button onclick="ask()">Send</button>
    </div>
</div>

<script>
const chat = document.getElementById("chat");

function addUserMessage(text) {
    let div = document.createElement("div");
    div.className = "message user";
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function addBotMessageHTML(html) {
    let div = document.createElement("div");
    div.className = "message bot";
    div.innerHTML = html;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function handleKey(event) {
    if (event.key === "Enter") {
        ask();
    }
}

function formatResponse(data) {
    if (!data) return "No response";
    
    return `
        <div class="section">
            <div class="section-title">🌿 Indigenous Insight</div>
            <div>${escapeHtml(data.indigenous_insight) || 'Not available'}</div>
        </div>
        <div class="section">
            <div class="section-title">📊 Scientific Insight</div>
            <div>${escapeHtml(data.scientific_insight) || 'Not available'}</div>
        </div>
        <div class="section">
            <div class="section-title">🌱 Recommendation</div>
            <div>${escapeHtml(data.recommendation) || 'Not available'}</div>
        </div>
        <div class="section">
            <div class="section-title">⚠️ Risk</div>
            <div>${escapeHtml(data.risk) || 'Not available'}</div>
        </div>
    </div>`;
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function ask() {
    let input = document.getElementById("q");
    let q = input.value.trim();

    if (!q) return;

    addUserMessage(q);
    input.value = "";

    let loading = document.createElement("div");
    loading.className = "message bot typing";
    loading.innerText = "Thinking...";
    chat.appendChild(loading);

    try {
        let res = await fetch(`/ask/?q=${encodeURIComponent(q)}`);

        // 🔴 IMPORTANT: Check if response is OK
        if (!res.ok) {
            throw new Error("Server returned " + res.status);
        }

        let response = await res.json();

        loading.remove();

        if (response.error) {
            addBotMessageHTML("⚠️ " + response.error);
            console.error(response.details);
            return;
        }

        let formatted = formatResponse({
            indigenous_insight: response.indigenous_insight,
            scientific_insight: response.scientific_insight,
            recommendation: response.recommendation,
            risk: response.risk
        });

        addBotMessageHTML(formatted);

    } catch (err) {
        loading.remove();
        addBotMessageHTML("⚠️ Error connecting to server");
        console.error("FRONTEND ERROR:", err);
    }
}
</script>

</body>
</html>
